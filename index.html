<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>农家鸡鸭摊 - 在线下单</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
      background: #faf7f2; color: #1f1f1f; line-height: 1.6; padding-bottom: 80px;
    }
    .banner {
      background: linear-gradient(135deg, #8B4513, #D2691E);
      color: white; text-align: center; padding: 30px 20px 24px;
    }
    .banner h1 { font-size: 24px; font-weight: 700; }
    .banner .icon { font-size: 40px; margin-bottom: 6px; }
    .banner p { font-size: 14px; opacity: 0.9; }
    .container { padding: 12px; }
    .section-title {
      font-size: 17px; font-weight: 700; color: #5D4037;
      margin: 16px 0 10px; padding-left: 10px;
      border-left: 3px solid #D2691E;
    }
    .card {
      background: white; border-radius: 10px; padding: 14px;
      margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .order-item {
      display: flex; justify-content: space-between; align-items: center;
    }
    .item-info { flex: 1; }
    .item-name { font-size: 16px; font-weight: 600; color: #1f1f1f; }
    .item-price { font-size: 13px; color: #D2691E; margin-top: 2px; }
    .qty-control {
      display: flex; align-items: center; gap: 10px;
    }
    .qty-btn {
      width: 34px; height: 34px; border-radius: 50%; border: 1px solid #ddd;
      background: white; font-size: 20px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #5D4037;
    }
    .qty-btn:active { background: #f0f0f0; }
    .qty-num { font-size: 18px; font-weight: 700; width: 24px; text-align: center; }
    .form-input {
      width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 15px; margin-bottom: 8px;
    }
    .form-input:focus { outline: none; border-color: #D2691E; }
    .submit-btn {
      width: 100%; padding: 14px; background: #D2691E; color: white;
      border: none; border-radius: 10px; font-size: 18px; font-weight: 700;
      cursor: pointer; margin-top: 6px;
    }
    .submit-btn:active { background: #B85E1A; }
    .total-bar {
      font-size: 16px; font-weight: 700; color: #5D4037;
      padding: 8px 0; text-align: right;
    }
    .total-bar span { color: #D2691E; font-size: 20px; }
    .contact-card {
      background: linear-gradient(135deg, #D2691E, #E8A87C);
      color: white; border-radius: 10px; padding: 16px; text-align: center; margin: 10px 0;
    }
    .contact-card .phone { font-size: 26px; font-weight: 700; letter-spacing: 2px; margin: 6px 0; }
    .contact-card .label { font-size: 14px; opacity: 0.9; }
    .call-btn {
      display: inline-block; background: white; color: #D2691E;
      border: none; border-radius: 30px; padding: 10px 30px;
      font-size: 16px; font-weight: 700; text-decoration: none; margin-top: 8px;
    }
    .order-summary {
      display: none; background: #FFF8F0; border: 1px solid #D2691E;
      border-radius: 10px; padding: 14px; margin: 12px 0;
    }
    .order-summary.show { display: block; }
    .order-summary h3 { color: #5D4037; font-size: 16px; margin-bottom: 8px; }
    .order-summary .line { font-size: 14px; color: #333; padding: 2px 0; }
  </style>
</head>
<body>

<div class="banner">
  <div class="icon">🐔</div>
  <h1>农家鸡鸭摊 · 在线下单</h1>
  <p>选择商品 · 填写信息 · 致电确认</p>
</div>

<div class="container">

  <div class="section-title">🐓 选择商品</div>

  <div class="card">
    <div class="order-item">
      <div class="item-info">
        <div class="item-name">河南草鸡</div>
        <div class="item-price">26 元/斤</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty('henan', -1)">−</button>
        <span class="qty-num" id="qty-henan">0</span>
        <button class="qty-btn" onclick="changeQty('henan', 1)">+</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="order-item">
      <div class="item-info">
        <div class="item-name">童子鸡</div>
        <div class="item-price">20 元/斤</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty('tongzi', -1)">−</button>
        <span class="qty-num" id="qty-tongzi">0</span>
        <button class="qty-btn" onclick="changeQty('tongzi', 1)">+</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="order-item">
      <div class="item-info">
        <div class="item-name">本地草鸡</div>
        <div class="item-price">18 元/斤</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty('bendi', -1)">−</button>
        <span class="qty-num" id="qty-bendi">0</span>
        <button class="qty-btn" onclick="changeQty('bendi', 1)">+</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="order-item">
      <div class="item-info">
        <div class="item-name">雪山草鸡</div>
        <div class="item-price">20 元/斤</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty('xueshan', -1)">−</button>
        <span class="qty-num" id="qty-xueshan">0</span>
        <button class="qty-btn" onclick="changeQty('xueshan', 1)">+</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="order-item">
      <div class="item-info">
        <div class="item-name">老鸭</div>
        <div class="item-price">23 元/斤</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty('laoya', -1)">−</button>
        <span class="qty-num" id="qty-laoya">0</span>
        <button class="qty-btn" onclick="changeQty('laoya', 1)">+</button>
      </div>
    </div>
  </div>

  <div class="total-bar">
    合计：<span id="total">0</span> 元
  </div>

  <div class="section-title">📝 联系方式</div>
  <div class="card">
    <input class="form-input" id="customerName" placeholder="你的称呼">
    <input class="form-input" id="customerPhone" placeholder="你的手机号" type="tel">
    <input class="form-input" id="customerAddr" placeholder="送货地址">
  </div>

  <button class="submit-btn" onclick="submitOrder()">📋 提交订单</button>

  <div class="order-summary" id="orderSummary">
    <h3>✅ 你的订单</h3>
    <div id="orderDetail"></div>
    <p style="font-size:14px;color:#666;margin-top:8px;">
      请打电话确认订单，老板看到后会尽快联系你！
    </p>
    <a href="tel:13402552134" class="call-btn" style="display:block;text-align:center;margin-top:10px;">
      📞 打电话确认
    </a>
  </div>

</div>

<script>
  const prices = { henan: 26, tongzi: 20, bendi: 18, xueshan: 20, laoya: 23 };
  const names = { henan: "河南草鸡", tongzi: "童子鸡", bendi: "本地草鸡", xueshan: "雪山草鸡", laoya: "老鸭" };
  const qty = { henan: 0, tongzi: 0, bendi: 0, xueshan: 0, laoya: 0 };

  function changeQty(key, delta) {
    qty[key] = Math.max(0, qty[key] + delta);
    document.getElementById("qty-" + key).textContent = qty[key];
    calcTotal();
  }

  function calcTotal() {
    let t = 0;
    for (let k in qty) t += qty[k] * prices[k];
    document.getElementById("total").textContent = t;
  }

  function submitOrder() {
    const name = document.getElementById("customerName").value.trim();
    const phone = document.getElementById("customerPhone").value.trim();
    const addr = document.getElementById("customerAddr").value.trim();
    if (!name || !phone) { alert("请填写称呼和手机号"); return; }

    let detail = "🛵 顾客：" + name + "\n📞 电话：" + phone;
    if (addr) detail += "\n📍 地址：" + addr;
    detail += "\n\n📋 商品清单：\n";

    let hasItem = false, total = 0;
    for (let k in qty) {
      if (qty[k] > 0) {
        detail += "  " + names[k] + " × " + qty[k] + " 斤 = " + (qty[k] * prices[k]) + "元\n";
        total += qty[k] * prices[k];
        hasItem = true;
      }
    }
    if (!hasItem) { alert("请选择商品"); return; }
    detail += "\n💰 合计：" + total + "元";

    document.getElementById("orderDetail").textContent = detail;
    document.getElementById("orderSummary").classList.add("show");
    document.getElementById("orderSummary").scrollIntoView({ behavior: "smooth" });
  }
</script>

</body>
</html>
